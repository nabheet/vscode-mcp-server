name: Publish to Marketplace

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci
        timeout-minutes: 2

      - name: Verify PAT
        timeout-minutes: 1
        run: npx @vscode/vsce verify-pat nabheet

      - run: npm run compile
        timeout-minutes: 2

      - run: npm test
        timeout-minutes: 2

      - name: Package VSIX
        timeout-minutes: 1
        run: npx @vscode/vsce package

      - name: Determine release type
        id: release-type
        run: |
          TAG="${GITHUB_REF_NAME}"
          if echo "$TAG" | grep -qE '\-pre'; then
            echo "pre-release=true" >> $GITHUB_OUTPUT
            echo "message=Pre-release $TAG" >> $GITHUB_OUTPUT
          else
            # Stable release — enforce tag is on main
            if ! git merge-base --is-ancestor HEAD origin/main 2>/dev/null; then
              echo "❌ Stable release tags must be on main branch"
              exit 1
            fi
            echo "pre-release=false" >> $GITHUB_OUTPUT
            echo "message=Release $TAG" >> $GITHUB_OUTPUT
          fi

      - name: Publish to VS Code Marketplace
        timeout-minutes: 2
        run: |
          if [ "${{ steps.release-type.outputs.pre-release }}" = "true" ]; then
            npx @vscode/vsce publish --pre-release
          else
            npx @vscode/vsce publish
          fi

      - name: Create GitHub Release
        if: steps.release-type.outputs.pre-release == 'false'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "*.vsix"
