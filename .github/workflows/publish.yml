name: Publish to Marketplace

on:
  push:
    branches: [main]
    tags:
      - v*-pre*

permissions:
  contents: write

env:
  VSCE_PAT: ${{ secrets.VSCE_PAT }}

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci
        timeout-minutes: 2

      - run: npm run compile
        timeout-minutes: 2

      - run: npm test
        timeout-minutes: 2

      - name: Is pre-release
        id: type
        run: echo "pre=${{ github.ref_type == 'tag' && 'true' || 'false' }}" >> $GITHUB_OUTPUT

      - name: Get next version (stable)
        if: steps.type.outputs.pre == 'false'
        id: version
        run: |
          LATEST=$(git tag --list 'v*' --sort=-v:refname | grep -v '\-pre' | head -1)
          if [[ -z "$LATEST" ]]; then
            CURRENT=$(node -p 'require("./package.json").version')
          else
            CURRENT="${LATEST#v}"
          fi
          IFS='.' read -r major minor patch <<< "$CURRENT"
          echo "v=${major}.${minor}.$((patch + 1))" >> $GITHUB_OUTPUT

      - name: Set version in package.json (stable)
        if: steps.type.outputs.pre == 'false'
        run: npm version ${{ steps.version.outputs.v }} --no-git-tag-version

      - name: Verify PAT
        timeout-minutes: 1
        run: npx @vscode/vsce verify-pat nabheet

      - name: Package VSIX
        run: npx @vscode/vsce package

      - name: Publish stable
        if: steps.type.outputs.pre == 'false'
        timeout-minutes: 3
        run: npx @vscode/vsce publish ${{ steps.version.outputs.v }} --no-git-tag-version

      - name: Publish pre-release
        if: steps.type.outputs.pre == 'true'
        timeout-minutes: 2
        run: npx @vscode/vsce publish "$(node -p 'require(\"./package.json\").version')" --pre-release --no-git-tag-version

      - name: Create tag + GitHub Release (stable only)
        if: steps.type.outputs.pre == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.v }}
          generate_release_notes: true
          files: "*.vsix"
