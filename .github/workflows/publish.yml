name: Publish to Marketplace

on:
  push:
    branches: [main]
    tags:
      - v*-pre*

permissions:
  contents: write

env:
  VSCE_PAT: ${{ secrets.VSCE_PAT }}

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci
        timeout-minutes: 2

      - run: npm run compile
        timeout-minutes: 2

      - run: npm test
        timeout-minutes: 2

      - name: Is pre-release
        id: type
        run: echo "pre=${{ github.ref_type == 'tag' && 'true' || 'false' }}" >> $GITHUB_OUTPUT

      - name: Verify PAT
        timeout-minutes: 1
        run: npx @vscode/vsce verify-pat nabheet

      - name: Publish stable (with retry)
        if: steps.type.outputs.pre == 'false'
        timeout-minutes: 5
        run: |
          for i in $(seq 1 3); do
            npx @vscode/vsce publish patch --no-git-tag-version && break
            echo "Publish failed, retrying ($i/3)..."
            sleep 3
          done

      - name: Publish pre-release
        if: steps.type.outputs.pre == 'true'
        timeout-minutes: 2
        run: npx @vscode/vsce publish patch --pre-release --no-git-tag-version

      - name: Get published version
        id: published
        run: echo "v=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Create tag (stable only)
        if: steps.type.outputs.pre == 'false'
        run: |
          git tag v${{ steps.published.outputs.v }}
          git push origin v${{ steps.published.outputs.v }}

      - name: Create GitHub Release (stable only)
        if: steps.type.outputs.pre == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.published.outputs.v }}
          generate_release_notes: true
          files: "*.vsix"
